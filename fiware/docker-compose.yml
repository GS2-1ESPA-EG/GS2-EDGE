# =============================================================
# FIWARE Descomplicado - Stack de containers para o OrbitStock
# =============================================================
#
# Este arquivo eh uma copia adaptada do FIWARE Descomplicado,
# de autoria do Prof. Fabio Henrique Cabrini, licenciado sob MIT.
# Repositorio original: https://github.com/fabiocabrini/fiware
#
# Distribuido juntamente com o projeto OrbitStock (Global Solution
# FIAP 2026) para permitir a reproducao autocontida do ambiente.
#
# Como subir:
#   sudo docker compose up -d
#
# Como derrubar:
#   sudo docker compose down
#
# Master reset (apaga TODOS os dados persistidos):
#   sudo docker compose down
#   sudo docker volume rm fiware_mongo-historical-data
#   sudo docker volume rm fiware_mongo-internal-data
#
# Portas expostas:
#   1026 - Orion Context Broker (HTTP/NGSI v2)
#   1883 - Mosquitto (MQTT)
#   4041 - IoT Agent UL (HTTP de admin)
#   8666 - STH-Comet (historico)
#   9001 - Mosquitto WebSocket (opcional, pro dashboard)
#   27017 - MongoDB historico (NAO abra no firewall em producao!)
# =============================================================

version: '3.7'

services:
  # MongoDB HISTORICO (com autenticacao) - usado pelo STH Comet
  mongo-db-historical:
    image: mongo:4.4
    container_name: fiware-mongo-historical
    restart: always
    hostname: mongo-db-historical
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    command: ["mongod", "--nojournal", "--auth"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-historical-data:/data/db

  # MongoDB INTERNO (sem autenticacao) - usado pelo Orion e IoT Agent
  mongo-db-internal:
    image: mongo:4.4
    container_name: fiware-mongo-internal
    restart: always
    hostname: mongo-db-internal
    command: ["mongod", "--nojournal"]
    volumes:
      - mongo-internal-data:/data/db

  # Orion Context Broker (NGSI v2)
  orion:
    image: fiware/orion:3.11.0
    restart: always
    container_name: fiware-orion
    hostname: orion
    depends_on:
      - mongo-db-historical
    ports:
      - "1026:1026"
    command: >
      -dbhost mongo-db-historical
      -dbuser admin
      -dbpwd admin123
      -dbAuthDb admin
      -corsOrigin __ALL
      -corsMaxAge 600

  # STH-Comet - historico de leituras
  fiware-sth-comet:
    image: telefonicaiot/fiware-sth-comet
    restart: always
    container_name: fiware-sth-comet
    hostname: sth-comet
    depends_on:
      - mongo-db-historical
    ports:
      - "8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_PREFIX=sth_
      - DB_URI=mongo-db-historical:27017
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_AUTH_SOURCE=admin
      - LOGOPS_LEVEL=DEBUG

  # Eclipse Mosquitto (broker MQTT)
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: always
    container_name: fiware-mosquitto
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # IoT Agent UL (Ultralight 2.0)
  iot-agent:
    image: fiware/iotagent-ul:latest
    restart: always
    container_name: fiware-iot-agent
    hostname: iot-agent
    depends_on:
      - mongo-db-internal
      - mosquitto
    expose:
      - "4041"
    ports:
      - "4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_NORTH_PORT=4041
      - IOTA_MONGO_HOST=mongo-db-internal
      - IOTA_MONGO_PORT=27017
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
      - IOTA_PROVIDER_URL=http://iot-agent:4041

volumes:
  mongo-historical-data:
  mongo-internal-data:
